name: Build and Push Container (yodaspeak / app_3FqAMhA71ppOo90FME7frgr5zwc)

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  IMAGE_REFERENCE: registry.ship.ngrok.com/ac_3evlwoysrwsb5eomobe7ywzh5dy/app_3fqamha71ppoo90fme7frgr5zwc
  NGROK_APP_ID: app_3FqAMhA71ppOo90FME7frgr5zwc

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: registry.ship.ngrok.com
          username: creg_3FqAMnbJlyZHLdGPcvYzjGAoHKG
          password: ${{ secrets.NGROK_REGISTRY_PASSWORD_CREG_3FQAMNBJLYZHLDGPCVYZJGAOHKG }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REFERENCE }}
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Write image reference
        run: |
          cat <<EOF > ngrok-image.json
          {"image":"${{ steps.meta.outputs.tags }}","commit_sha":"${{ github.sha }}"}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ngrok-compute-image
          path: ngrok-image.json
