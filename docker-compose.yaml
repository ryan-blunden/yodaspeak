services:
  app:
    container_name: app
    image: ghcr.io/ryan-blunden/yodaspeak:latest
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 8000:8000
    env_file:
      - .env
    restart: on-failure
    stop_grace_period: 3s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - .env  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yodaspeak"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure
    stop_grace_period: 3s
    volumes:
      - postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure
    stop_grace_period: 3s
    volumes:
      - redis:/redis

volumes:
  postgres: {}
  redis: {}
